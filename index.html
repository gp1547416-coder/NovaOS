<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaOS Pro</title>
    <style>
        :root { --accent: #007AFF; }
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }

        /* The Hardware Shell */
        .phone-shell {
            width: 340px; height: 680px; background: #1a1a1b; border-radius: 45px;
            border: 8px solid #333; padding: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            position: relative; transition: transform 0.3s;
        }

        /* The Screen */
        .screen {
            width: 100%; height: 100%; background: linear-gradient(135deg, #1e3a8a, #581c87);
            border-radius: 35px; overflow: hidden; display: flex; flex-direction: column;
            position: relative; transition: opacity 0.3s;
        }

        .screen.off { opacity: 0; pointer-events: none; }

        /* App Window Layer */
        #app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 50px);
            background: white; transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            z-index: 10; display: flex; flex-direction: column;
        }
        #app-window.open { transform: translateY(0); }
        #app-window iframe { flex: 1; border: none; }

        .status-bar { padding: 15px 22px 5px; display: flex; justify-content: space-between; font-size: 12px; color: white; font-weight: 600; z-index: 5; }

        .desktop { flex: 1; padding: 30px 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-content: start; }

        .app { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .app-icon { width: 55px; height: 55px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .app span { font-size: 11px; }

        /* Android Nav Bar */
        .nav-bar { height: 50px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-around; align-items: center; color: white; cursor: pointer; z-index: 11; }
        .nav-btn:hover { background: rgba(255,255,255,0.1); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

        /* Physical Buttons */
        .power-btn { position: absolute; right: -12px; top: 100px; width: 4px; height: 60px; background: #444; border-radius: 0 4px 4px 0; cursor: pointer; }
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="power-btn" onclick="togglePower()"></div>
    
    <div class="screen" id="main-screen">
        <div class="status-bar">
            <span id="clock">12:00</span>
            <span>NovaOS 🔋</span>
        </div>

        <div id="app-window">
            <div style="padding: 10px; background: #f1f1f1; font-size: 12px; color: #666; text-align: center;" id="window-title">App</div>
            <iframe id="app-frame" src=""></iframe>
        </div>
        
        <div class="desktop">
            <div class="app" onclick="openApp('Google', 'https://www.google.com/search?igu=1')">
                <div class="app-icon">🌐</div>
                <span>Browser</span>
            </div>
            <div class="app" onclick="openApp('Maps', 'https://www.google.com/maps/embed')">
                <div class="app-icon">📍</div>
                <span>Maps</span>
            </div>
            <div class="app" onclick="openApp('Nova Config', 'about:blank')">
                <div class="app-icon">⚙️</div>
                <span>Settings</span>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-btn" onclick="closeApp()">◀</div>
            <div class="nav-btn" onclick="closeApp()">●</div>
            <div class="nav-btn" onclick="alert('Recents Empty')">■</div>
        </div>
    </div>
</div>

<script>
    // 1. Live Clock Function
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. Open App Function
    function openApp(name, url) {
        const win = document.getElementById('app-window');
        document.getElementById('app-frame').src = url;
        document.getElementById('window-title').innerText = name;
        win.classList.add('open');
    }

    // 3. Close App (Back/Home Button)
    function closeApp() {
        document.getElementById('app-window').classList.remove('open');
        setTimeout(() => { document.getElementById('app-frame').src = ''; }, 400);
    }

    // 4. Power Button (Toggle Screen)
    function togglePower() {
        document.getElementById('main-screen').classList.toggle('off');
    }
</script>

</body>
</html>
