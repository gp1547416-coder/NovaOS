<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaOS Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone-shell">
    <div class="power-btn" onclick="togglePower()"></div>
    
    <div class="screen" id="main-screen">
        <div class="status-bar">
            <span id="clock">12:00</span>
            <span>NovaOS 🔋</span>
        </div>

        <div id="app-window">
            <div class="window-header">
                <span id="window-title">App</span>
            </div>
            
            <div id="settings-content" class="settings-list" style="display:none;"></div>
            
            <iframe id="app-frame" src="" style="display:none;"></iframe>
        </div>
        
        <div class="desktop">
            <div class="app" onclick="openApp('Browser', 'https://www.bing.com')">
                <div class="app-icon">🌐</div>
                <span>Browser</span>
            </div>
            <div class="app" onclick="openApp('Maps', 'https://www.google.com/maps/embed')">
                <div class="app-icon">📍</div>
                <span>Maps</span>
            </div>
            <div class="app" onclick="openApp('Settings', '')">
                <div class="app-icon">⚙️</div>
                <span>Settings</span>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-btn" onclick="closeApp()">◀</div>
            <div class="nav-btn" onclick="closeApp()">●</div>
            <div class="nav-btn" onclick="alert('No recent apps')">■</div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
