<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaOS Pro</title>
    <style>
        :root { --phone-bg: #1a1a1b; }
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        .phone-shell { width: 340px; height: 680px; background: var(--phone-bg); border-radius: 45px; border: 8px solid #333; padding: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); position: relative; overflow: hidden; }
        .screen { width: 100%; height: 100%; background: linear-gradient(135deg, #1e3a8a, #581c87); border-radius: 35px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .screen.off { opacity: 0; pointer-events: none; }
        #app-window { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 50px); background: white; transform: translateY(110%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 10; display: none; flex-direction: column; }
        #app-window.open { display: flex; transform: translateY(0); }
        .window-header { padding: 15px; background: #f1f1f1; font-weight: bold; text-align: center; border-bottom: 1px solid #ddd; color: #333; }
        iframe { flex: 1; border: none; }
        .settings-list { flex: 1; overflow-y: auto; background: #f5f5f7; color: #333; }
        .setting-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; background: white; cursor: pointer; }
        .status-bar { padding: 15px 22px 5px; display: flex; justify-content: space-between; font-size: 12px; color: white; }
        .desktop { flex: 1; padding: 30px 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-content: start; }
        .app { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: white; }
        .app-icon { width: 55px; height: 55px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 6px; }
        .nav-bar { height: 50px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-around; align-items: center; color: white; font-size: 18px; }
        .power-btn { position: absolute; right: -12px; top: 100px; width: 4px; height: 60px; background: #444; border-radius: 0 4px 4px 0; cursor: pointer; z-index: 20;}
    </style>
</head>
<body>

<div class="phone-shell">
    <div class="power-btn" onclick="togglePower()"></div>
    <div class="screen" id="main-screen">
        <div class="status-bar"><span id="clock">12:00</span><span>NovaOS 🔋</span></div>
        <div id="app-window">
            <div class="window-header"><span id="window-title">App</span></div>
            <div id="settings-content" class="settings-list" style="display:none;"></div>
            <iframe id="app-frame" src="" style="display:none;"></iframe>
        </div>
        <div class="desktop">
            <div class="app" onclick="openApp('Browser', 'https://www.bing.com')"><div class="app-icon">🌐</div><span>Browser</span></div>
            <div class="app" onclick="openApp('Maps', 'https://www.google.com/maps/embed')"><div class="app-icon">📍</div><span>Maps</span></div>
            <div class="app" onclick="openApp('Settings', '')"><div class="app-icon">⚙️</div><span>Settings</span></div>
        </div>
        <div class="nav-bar"><div onclick="closeApp()">◀</div><div onclick="closeApp()">●</div><div onclick="alert('Empty')">■</div></div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
    }
    setInterval(updateClock, 1000); updateClock();

    function togglePower() { document.getElementById('main-screen').classList.toggle('off'); }

    function openApp(name, url) {
        const win = document.getElementById('app-window');
        const frame = document.getElementById('app-frame');
        const settings = document.getElementById('settings-content');
        document.getElementById('window-title').innerText = name;
        win.style.display = "flex";
        if (name === 'Settings') {
            frame.style.display = "none"; settings.style.display = "block"; generateSettings();
        } else {
            settings.style.display = "none"; frame.style.display = "block"; frame.src = url;
        }
        setTimeout(() => win.classList.add('open'), 10);
    }

    function closeApp() {
        const win = document.getElementById('app-window');
        win.classList.remove('open');
        setTimeout(() => { win.style.display = "none"; document.getElementById('app-frame').src = ""; }, 400);
    }

    function generateSettings() {
        const container = document.getElementById('settings-content');
        container.innerHTML = "";
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.className = 'setting-item';
            div.innerHTML = `<span>⚙️</span> <span>Option ${i}</span>`;
            container.appendChild(div);
        }
    }
</script>
</body>
</html>
